name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff psutil numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Lint
        run: |
          ruff check vllm_swift/ tests/
          ruff format --check vllm_swift/ tests/

      - name: Run tests
        run: |
          python -m pytest tests/ --cov=vllm_swift --cov-fail-under=85 -v
